# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.7/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file

version: v1.7

environmentFolderPath: ./env

provision:
  # Creates a new Azure Active Directory (AAD) app to authenticate users
  - uses: botAadApp/create
    with:
      name: QQIA-Agent-${{TEAMSFX_ENV}}
    writeToEnvironmentFile:
      botId: BOT_ID
      botPassword: SECRET_BOT_PASSWORD

  # Creates a Teams app
  - uses: teamsApp/create
    with:
      name: QQIA Agent-${{TEAMSFX_ENV}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Deploy Bicep to Azure
  - uses: arm/deploy
    with:
      subscriptionId: ${{AZURE_SUBSCRIPTION_ID}}
      resourceGroupName: ${{AZURE_RESOURCE_GROUP_NAME}}
      templates:
        - path: ./infra/azure.bicep
          parameters: ./infra/azure.parameters.json
          deploymentName: qqia-agent-deploy
      bicepCliVersion: v0.9.1
    writeToEnvironmentFile:
      botWebAppName: BOT_AZURE_APP_SERVICE_RESOURCE_ID
      botWebAppEndpoint: BOT_DOMAIN

  # Validate the manifest
  - uses: teamsApp/validateManifest
    with:
      manifestPath: ./appPackage/manifest.json

  # Build Teams app package
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  # Apply the Teams app manifest
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

deploy:
  # Install dependencies
  - uses: cli/runNpmCommand
    with:
      args: install

  # Build the project
  - uses: cli/runNpmCommand
    with:
      args: run build

  # Deploy to Azure App Service
  - uses: azureAppService/zipDeploy
    with:
      artifactFolder: .
      resourceId: ${{BOT_AZURE_APP_SERVICE_RESOURCE_ID}}
