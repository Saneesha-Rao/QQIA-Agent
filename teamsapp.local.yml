# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.7/yaml.schema.json
# Teams Toolkit local development configuration

version: v1.7

environmentFolderPath: ./env

provision:
  # Creates a new AAD app for the bot (local)
  - uses: botAadApp/create
    with:
      name: QQIA-Agent-local
    writeToEnvironmentFile:
      botId: BOT_ID
      botPassword: SECRET_BOT_PASSWORD

  # Creates a Teams app
  - uses: teamsApp/create
    with:
      name: QQIA Agent-local
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Create the debug profile for local bot
  - uses: botFramework/create
    with:
      botId: ${{BOT_ID}}
      name: QQIA-Agent-local
      messagingEndpoint: https://${{BOT_DOMAIN}}/api/messages
      description: QQIA Agent local dev
      channels:
        - name: msteams

  # Validate manifest
  - uses: teamsApp/validateManifest
    with:
      manifestPath: ./appPackage/manifest.json

  # Build Teams app package
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  # Apply the Teams app manifest
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

deploy:
  - uses: cli/runNpmCommand
    with:
      args: install
  - uses: cli/runNpmCommand
    with:
      args: run build
